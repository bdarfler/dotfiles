# kitty.conf — only my overrides.
# Full annotated defaults / docs: https://sw.kovidgoyal.net/kitty/conf/

# BEGIN_KITTY_CONFIG
font_family          family="FiraCode Nerd Font Med"
font_size            14
tab_bar_style        powerline
notify_on_cmd_finish invisible 60
enable_audio_bell    no
# END_KITTY_CONFIG

# BEGIN_KITTY_THEME
# Gruvbox Dark
include current-theme.conf
# END_KITTY_THEME

# revdiff-plan overlay support
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}
